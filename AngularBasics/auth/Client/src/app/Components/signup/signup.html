<div class="container">
  <div class="row">
    <div class="col-md-6 offset-md-3">
      <h2 class="text-center text-dark mt-5">Register</h2>
      <div class="text-center mb-5 text-dark">Create your account</div>
      <div class="card my-5">

        <form class="card-body cardbody-color p-lg-5" (ngSubmit)="onSubmit()" #signupForm="ngForm">

          <div class="text-center">
            <img [src]="previewUrl || 'https://cdn.pixabay.com/photo/2016/03/31/19/56/avatar-1295397__340.png'"
                 class="img-fluid profile-image-pic img-thumbnail rounded-circle my-3"
                 width="200px" alt="profile">
          </div>

          <div class="mb-3">
            <input type="file" class="form-control" (change)="onFileSelected($event)">
          </div>

          <div class="mb-3">
            <input type="text" class="form-control" name="fullname" [(ngModel)]="user.fullname" placeholder="Full Name" required>
          </div>

          <div class="mb-3">
            <input type="text" class="form-control" name="username" [(ngModel)]="user.username" placeholder="Username" required>
          </div>

          <div class="mb-3">
            <input type="email" class="form-control" name="email" [(ngModel)]="user.email" placeholder="Email Address" required>
          </div>

          <div class="mb-3">
            <input type="text" class="form-control" name="phone" [(ngModel)]="user.phone" placeholder="Phone">
          </div>

          <div class="mb-3">
            <input type="text" class="form-control" name="address" [(ngModel)]="user.address" placeholder="Address">
          </div>

          <div class="mb-3">
            <input type="password" class="form-control" name="password" [(ngModel)]="user.password" placeholder="Password" required>
          </div>

          <div class="mb-3">
            <input type="password" class="form-control" name="confirmPassword" [(ngModel)]="user.confirmPassword" placeholder="Confirm Password" required>
          </div>

          <div class="text-center">
            <button type="submit" class="btn btn-color px-5 mb-5 w-100" [disabled]="!signupForm.form.valid">
              Register
            </button>
          </div>

          <div class="form-text text-center mb-5 text-dark">
            Already Registered? <a routerLink="/login" class="text-dark fw-bold">Login Here</a>
          </div>

        </form>

      </div>
    </div>
  </div>
</div>
